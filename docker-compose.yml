# ─────────────────────────────────────────────────────────────
#  Origin Hub Registry — Production docker-compose
#
#  Usage:
#    cp .env.example .env          # fill in SECRET_KEY etc.
#    docker compose up -d          # start
#    docker compose logs -f        # tail logs
#    docker compose down           # stop
# ─────────────────────────────────────────────────────────────

name: origin-hub

services:
  hub-registry:
    image: ${IMAGE_NAME:-logicist/origin-hub-registry}:${IMAGE_TAG:-latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      # Pass build-time args if needed
      # args:
      #   - BUILD_ENV=production
    container_name: origin_hub_registry
    restart: unless-stopped

    # Load secrets from .env file (never commit .env to git)
    env_file:
      - .env

    ports:
      - "${HOST_PORT:-8000}:${PORT:-8000}"

    volumes:
      # SQLite database — survives container restarts & upgrades
      - hub_data:/data
      # Uploaded .originpkg bundles
      - hub_storage:/storage

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8000}/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # Limit resource usage in production
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  hub_data:
    driver: local
  hub_storage:
    driver: local
