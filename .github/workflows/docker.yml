name: Docker Build & Publish

on:
  push:
    branches:
      - master
    tags:
      - "v*"          # e.g. v1.0.0 triggers a versioned release
  pull_request:
    branches:
      - master        # PRs only build (no push) to validate the Dockerfile

env:
  REGISTRY: docker.io
  IMAGE_NAME: logicist/origin-hub-registry

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker Buildx (multi-platform support) ──────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to Docker Hub ──────────────────────────────────
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Generate image tags ──────────────────────────────────
      # On master push:  logicist/origin-hub-registry:latest
      #                  logicist/origin-hub-registry:sha-abc1234
      # On tag v1.2.3:   logicist/origin-hub-registry:1.2.3
      #                  logicist/origin-hub-registry:1.2
      #                  logicist/origin-hub-registry:latest
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Origin Hub Registry
            org.opencontainers.image.description=Central asset registry for Origin CLI
            org.opencontainers.image.vendor=logicist
            org.opencontainers.image.source=https://github.com/pandaind/origin_hub_registry

      # ── Build & Push ─────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ── Summary ──────────────────────────────────────────────
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "✅ Published to https://hub.docker.com/r/logicist/origin-hub-registry"
