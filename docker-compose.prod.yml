# ─────────────────────────────────────────────────────────────────────────────
#  Origin Hub Registry — Standalone Production Compose
#
#  This file is designed to be used WITHOUT cloning the repository.
#  It pulls the pre-built image from Docker Hub.
#
#  Quick-start on any machine:
#
#    1. Download this file:
#         curl -O https://raw.githubusercontent.com/pandaind/origin_hub_registry/master/docker-compose.prod.yml
#
#    2. Create your environment file:
#         curl -O https://raw.githubusercontent.com/pandaind/origin_hub_registry/master/.env.example
#         cp .env.example .env
#         # Edit .env and set a strong SECRET_KEY:
#         #   python3 -c "import secrets; print(secrets.token_hex(32))"
#
#    3. Pull and run:
#         docker compose -f docker-compose.prod.yml up -d
#
#    4. Open: http://localhost:8000
#       API Docs: http://localhost:8000/docs
#
#  To update to the latest version:
#    docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
#
#  To stop:
#    docker compose -f docker-compose.prod.yml down
# ─────────────────────────────────────────────────────────────────────────────

services:
  hub-registry:
    image: logicist/origin-hub-registry:${IMAGE_TAG:-latest}
    container_name: origin_hub_registry
    restart: unless-stopped

    # Load secrets from .env (copy from .env.example and set SECRET_KEY)
    env_file:
      - .env

    ports:
      - "${HOST_PORT:-8000}:${PORT:-8000}"

    volumes:
      # SQLite database — persists across restarts and upgrades
      - hub_data:/data
      # Uploaded .originpkg asset bundles
      - hub_storage:/storage

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8000}/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  hub_data:
    driver: local
  hub_storage:
    driver: local
